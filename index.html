<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dólar Blue Argentina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      background: #0a0a1a;
      overflow: hidden;
      position: relative;
    }

    /* Fondo con emojis de dólar (grandes y coloridos) */
    body::before {
      content: "💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵💵";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      font-size: 4.5rem;
      opacity: 0.3;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
      animation: floatEmojis 20s linear infinite;
      pointer-events: none;
      z-index: 0;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
    }

    @keyframes floatEmojis {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-25px) rotate(5deg) scale(1.05); }
      50% { transform: translateY(0) rotate(0deg) scale(1); }
      75% { transform: translateY(25px) rotate(-5deg) scale(0.95); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: box-shadow 0.3s;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
    }
    .header p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .badge {
      background: #ecfdf5;
      color: #065f46;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.95rem;
      border: 1px solid #a7f3d0;
      margin-bottom: 20px;
    }
    .bienvenida {
      text-align: center;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 15px;
    }
    .bienvenida strong {
      color: #1e293b;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }
    .card .value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 6px;
    }
    .card.compra {
      border-left: 4px solid #0ea5e9;
    }
    .card.compra .value { color: #0ea5e9; }
    .card.venta {
      border-left: 4px solid #f59e0b;
    }
    .card.venta .value { color: #f59e0b; }
    .card.promedio {
      grid-column: 1 / -1;
      background: #0f172a;
      border: none;
      border-left: 4px solid #f7971e;
    }
    .card.promedio .label { color: #94a3b8; }
    .card.promedio .value { color: #ffd200; }
    .fecha {
      background: #f8fafc;
      color: #475569;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0055A4;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #003d7a;
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(0, 85, 164, 0.3);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-salir {
      width: 100%;
      padding: 14px;
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn-salir:hover {
      background: #c53030;
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(229, 62, 62, 0.3);
    }
    .btn-salir:active {
      transform: scale(0.98);
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 2px solid #e2e8f0;
      background: #f8fafc;
      padding: 16px 20px;
      margin: 20px -32px -40px -32px;
      border-radius: 0 0 24px 24px;
    }
    .footer .powered {
      font-size: 0.6rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .footer .nombre {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e293b;
    }
    @media (max-width: 420px) {
      .container { padding: 28px 20px; }
      .header h1 { font-size: 1.6rem; }
      .card .value { font-size: 1.5rem; }
      .footer {
        margin: 20px -20px -28px -20px;
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="header">
      <h1>Dolar Blue</h1>
      <p>Cotizacion en Argentina</p>
    </div>

    <div id="auth-section">
      <div class="bienvenida">Bienvenido, <strong>Daniel</strong></div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px; font-size: 0.9rem;">Palabra Secreta</label>
        <input type="password" id="secretoInput" placeholder="Ingresa tu palabra secreta" 
               style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: all 0.3s;">
      </div>
      <button class="btn" onclick="iniciarSesion()">Ver Cotizacion</button>
      <div id="mensaje" style="margin-top: 15px; text-align: center; font-weight: 500;"></div>
    </div>

    <div id="cotizacion-section" style="display: none;">
      <div class="badge" id="badgeUser">Autenticacion exitosa</div>
      <div class="grid">
        <div class="card compra">
          <div class="label">Compra</div>
          <div class="value" id="precioCompra">-</div>
        </div>
        <div class="card venta">
          <div class="label">Venta</div>
          <div class="value" id="precioVenta">-</div>
        </div>
        <div class="card promedio">
          <div class="label">Promedio</div>
          <div class="value" id="precioPromedio">-</div>
        </div>
      </div>
      <div class="fecha" id="fechaActualizacion">Actualizando...</div>
      
      <button class="btn" onclick="actualizarCotizacion()">Actualizar cotizacion</button>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesion</button>
    </div>

    <div class="footer">
      <div class="powered">powered by</div>
      <div class="nombre">Daniel Oscar Rodriguez</div>
    </div>
  </div>

  <script>
    const DNI_FIJO = "24780998";

    async function validarSecretoConAPI(dni, secreto) {
      try {
        const respuesta = await fetch(`https://api-desarrollo-aplicaciones.vercel.app/api/alumnos/${dni}`);
        const json = await respuesta.json();
        return json && json.token === secreto;
      } catch (error) {
        console.error('Error al validar:', error);
        return false;
      }
    }

    async function obtenerCotizacion() {
      const respuesta = await fetch('https://dolarapi.com/v1/dolares/blue');
      return await respuesta.json();
    }

    async function iniciarSesion() {
      const secreto = document.getElementById('secretoInput').value.trim();
      const mensaje = document.getElementById('mensaje');

      if (!secreto) {
        mensaje.style.color = '#e53e3e';
        mensaje.textContent = 'Ingresa la Palabra Secreta';
        return;
      }

      mensaje.style.color = '#3182ce';
      mensaje.textContent = 'Verificando...';

      const valido = await validarSecretoConAPI(DNI_FIJO, secreto);

      if (valido) {
        mensaje.style.color = '#38a169';
        mensaje.textContent = 'Autenticacion exitosa';
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('cotizacion-section').style.display = 'block';
        await actualizarCotizacion();
      } else {
        mensaje.style.color = '#e53e3e';
        mensaje.textContent = 'Palabra Secreta incorrecta';
      }
    }

    async function actualizarCotizacion() {
      try {
        const data = await obtenerCotizacion();
        const promedio = (data.compra + data.venta) / 2;
        const fecha = new Date(data.fechaActualizacion);

        document.getElementById('precioCompra').textContent = '$' + data.compra;
        document.getElementById('precioVenta').textContent = '$' + data.venta;
        document.getElementById('precioPromedio').textContent = '$' + promedio.toFixed(2);
        document.getElementById('fechaActualizacion').textContent = 
          'Actualizado: ' + fecha.toLocaleString('es-AR');
        document.getElementById('badgeUser').textContent = 
          'Autenticacion exitosa';

      } catch (error) {
        alert('Error al obtener cotizacion: ' + error.message);
      }
    }

    function cerrarSesion() {
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('cotizacion-section').style.display = 'none';
      document.getElementById('secretoInput').value = '';
      document.getElementById('mensaje').textContent = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const authSection = document.getElementById('auth-section');
        if (authSection.style.display !== 'none') {
          iniciarSesion();
        }
      }
    });
  </script>
</body>
</html>
