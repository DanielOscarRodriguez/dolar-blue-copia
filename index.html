<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dólar Blue Argentina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a1a;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      height: 100%;
      padding: 20px;
      position: relative;
    }
    body::before {
      content: "$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      font-size: 4rem;
      color: rgba(255, 215, 0, 0.2);
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
      animation: twinkle 3s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.95); text-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
      50% { opacity: 0.4; transform: scale(1.05); text-shadow: 0 0 60px rgba(255, 215, 0, 0.4); }
      100% { opacity: 0.1; transform: scale(0.95); text-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
    }
    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      margin: auto;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
    }
    .header p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .badge {
      background: #ecfdf5;
      color: #065f46;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.95rem;
      border: 1px solid #a7f3d0;
      margin-bottom: 20px;
    }
    .bienvenida {
      text-align: center;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 15px;
    }
    .bienvenida strong {
      color: #1e293b;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }
    .card .value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 6px;
    }
    .card.compra {
      border-left: 4px solid #0ea5e9;
    }
    .card.compra .value {
      color: #0ea5e9;
    }
    .card.venta {
      border-left: 4px solid #f59e0b;
    }
    .card.venta .value {
      color: #f59e0b;
    }
    .card.promedio {
      grid-column: 1 / -1;
      background: #0f172a;
      border: none;
      border-left: 4px solid #f7971e;
    }
    .card.promedio .label {
      color: #94a3b8;
    }
    .card.promedio .value {
      color: #ffd200;
    }
    .fecha {
      background: #f8fafc;
      color: #475569;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
